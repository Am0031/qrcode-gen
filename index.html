<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Code Generator</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 20px;
        background: #f9f9f9;
      }
      body * {
        font-size: 16px;
      }
      h1 {
        color: #333;
        font-size: 32px;
        margin-bottom: 20px;
      }
      input[type="text"] {
        width: 100%; /* full width on mobile */
        padding: 12px;
        font-size: 16px;
        margin: 10px 0;
        box-sizing: border-box;
        height: 48px;
      }
      input[type="checkbox"] {
        width: 16px;
        height: 16px;
        margin: 0 8px 0 0;
        vertical-align: middle;
      }
      label {
        display: inline-flex;
        align-items: center;
      }
      .input-field {
        width: 100%;
      }
      .input-narrow {
        width: 300px;
        max-width: 100%;
        margin: 10px 0;
      }
      select {
        width: 100%;
        padding: 12px;
        font-size: 16px;
        margin: 10px 0;
        box-sizing: border-box;
        height: 48px;
      }
      .button-group {
        display: flex;
        flex-wrap: wrap; /* allow wrapping on small screens */
        justify-content: center;
        gap: 10px;
        margin-top: 10px;
      }
      button {
        flex: 1 1 auto; /* buttons expand/shrink */
        min-width: 120px;
        padding: 12px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        border-radius: 4px;
        color: white;
      }
      .button-base {
        background-color: #0078d7;
      }
      .button-generate {
        background-color: green;
      }
      .button-clear {
        background-color: #b30101;
      }
      .button-base:hover {
        background-color: #005a9e;
      }
      .button-generate:hover {
        background-color: #015c01;
      }
      .button-clear:hover {
        background-color: #8d0000;
      }
      #qrcode {
        margin-top: 20px;
      }

      /* Mobile-specific tweaks */
      @media screen and (max-width: 600px) {
        h1 {
          font-size: 40px;
        }
        button {
          width: 100%; /* stack buttons full width */
        }
      }
    </style>
  </head>
  <body>
    <h1>QR Code Generator</h1>
    <div class="input-field">
      <input id="text" type="text" placeholder="Enter URL or text" />
    </div>
    <div class="input-field" style="text-align: left">
      <label>
        <input id="utmSource" type="checkbox" />
        Add source tag (utm_source=...) for traffic tracking
      </label>
    </div>
    <div id="utmSourceOptions" style="display: none">
      <div class="input-field input-narrow">
        <select id="utmSourceSelect">
          <option value="qrcode">QR code (classic)</option>
          <option value="newsletter">Newsletter (Brevo)</option>
          <option value="facebook">Facebook</option>
          <option value="custom">Custom...</option>
        </select>
      </div>
      <div
        class="input-field input-narrow"
        id="utmSourceCustomWrapper"
        style="display: none"
      >
        <input
          id="utmSourceCustom"
          type="text"
          placeholder="Enter custom source name"
        />
      </div>
    </div>
    <div
      class="input-field"
      id="finalUrlPreview"
      style="text-align: left; color: #555; display: none; margin-top: 25px;"
    >
      The generated QR code will match this URL: <strong id="finalUrlText"></strong>
      <br />
      <button
        class="button-base"
        onclick="copyFinalUrl()"
        style="margin-top: 8px"
      >
        <i class="fa-solid fa-link"></i> Copy URL
      </button>
    </div>
    <br />
    <div class="button-group">
      <button class="button-generate" onclick="generateQRCode()">
        <i class="fa-solid fa-qrcode"></i> Generate
      </button>
      <button class="button-base" onclick="downloadQRCode()">
        <i class="fa-solid fa-download"></i> Download PNG
      </button>
      <button class="button-base" onclick="copyQRCodeImage()">
        <i class="fa-solid fa-copy"></i> Copy to Clipboard
      </button>
      <button class="button-clear" onclick="clearAll()">
        <i class="fa-solid fa-trash"></i> Clear
      </button>
    </div>

    <div id="qrcode"></div>

    <script>
      let lastCanvas = null;

      function sanitizeSourceName(name) {
        return name.trim().replace(/\s+/g, "_");
      }

      function getSelectedSource() {
        const select = document.getElementById("utmSourceSelect");
        if (select.value !== "custom") return select.value;
        const custom = sanitizeSourceName(
          document.getElementById("utmSourceCustom").value
        );
        return custom || "qrcode"; // fall back if custom field is left empty
      }

      function addUtmSource(url, source) {
        try {
          const parsed = new URL(url);
          parsed.searchParams.set("utm_source", source);
          return parsed.toString();
        } catch (e) {
          // Not a valid absolute URL — fall back to plain query-string handling
          const separator = url.includes("?") ? "&" : "?";
          return `${url}${separator}utm_source=${encodeURIComponent(source)}`;
        }
      }

      function getFinalUrl() {
        const raw = document.getElementById("text").value.trim();
        if (!raw) return "";
        return document.getElementById("utmSource").checked
          ? addUtmSource(raw, getSelectedSource())
          : raw;
      }

      function updateFinalUrlPreview() {
        const finalUrl = getFinalUrl();
        const preview = document.getElementById("finalUrlPreview");
        document.getElementById("finalUrlText").textContent = finalUrl;
        preview.style.display = finalUrl ? "block" : "none";
      }

      function updateUtmSourceOptionsVisibility() {
        const checked = document.getElementById("utmSource").checked;
        document.getElementById("utmSourceOptions").style.display = checked
          ? "block"
          : "none";
        updateUtmSourceCustomVisibility();
      }

      function updateUtmSourceCustomVisibility() {
        const isCustom =
          document.getElementById("utmSourceSelect").value === "custom";
        document.getElementById("utmSourceCustomWrapper").style.display =
          document.getElementById("utmSource").checked && isCustom
            ? "block"
            : "none";
      }

      document
        .getElementById("text")
        .addEventListener("input", updateFinalUrlPreview);
      document.getElementById("utmSource").addEventListener("change", () => {
        updateUtmSourceOptionsVisibility();
        updateFinalUrlPreview();
      });
      document
        .getElementById("utmSourceSelect")
        .addEventListener("change", () => {
          updateUtmSourceCustomVisibility();
          updateFinalUrlPreview();
        });
      document
        .getElementById("utmSourceCustom")
        .addEventListener("input", updateFinalUrlPreview);

      function generateQRCode() {
        const text = getFinalUrl();
        if (!text) {
          alert("Please enter some text or a URL first!");
          return; // stop here if input is empty
        }

        updateFinalUrlPreview();

        const container = document.getElementById("qrcode");
        container.innerHTML = ""; // clear previous QR
        QRCode.toCanvas(text, { width: 256 }, function (err, canvas) {
          if (err) console.error(err);
          container.appendChild(canvas);
          lastCanvas = canvas;
        });
      }

      function downloadQRCode() {
        if (!lastCanvas) return alert("Generate a QR code first!");
        const link = document.createElement("a");
        link.download = "qrcode.png";
        link.href = lastCanvas.toDataURL();
        link.click();
      }

      async function copyQRCodeImage() {
        if (!lastCanvas) return alert("Generate a QR code first!");
        try {
          const blob = await new Promise((resolve) =>
            lastCanvas.toBlob(resolve)
          );
          const item = new ClipboardItem({ "image/png": blob });
          await navigator.clipboard.write([item]);
          alert("QR code image copied to clipboard!");
        } catch (err) {
          console.error(err);
          alert(
            "Copy failed — your browser may not support image clipboard yet."
          );
        }
      }
      async function copyFinalUrl() {
        const finalUrl = getFinalUrl();
        if (!finalUrl) return alert("Please enter some text or a URL first!");
        try {
          await navigator.clipboard.writeText(finalUrl);
          alert("URL copied to clipboard!");
        } catch (err) {
          console.error(err);
          alert("Copy failed — your browser may not support clipboard access.");
        }
      }

      function clearAll() {
        document.getElementById("text").value = "";
        document.getElementById("utmSource").checked = false;
        document.getElementById("utmSourceSelect").value = "qrcode";
        document.getElementById("utmSourceCustom").value = "";
        document.getElementById("qrcode").innerHTML = "";
        updateUtmSourceOptionsVisibility();
        updateFinalUrlPreview();
        lastCanvas = null;
      }
    </script>
  </body>
</html>
